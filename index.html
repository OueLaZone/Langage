<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LinguaPal" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>LinguaPal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Fraunces:ital,wght@0,300;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f1a;
      --bg2: #16162a;
      --bg3: #1e1e35;
      --accent: #7c6dfa;
      --accent2: #a78bfa;
      --correction-bg: #2a1f0a;
      --correction-border: #b45309;
      --correction-text: #fcd34d;
      --text: #e8e6f0;
      --text2: #9b99b0;
      --bubble-user: #7c6dfa;
      --bubble-bot: #1e1e35;
      --border: rgba(255,255,255,0.07);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      background: var(--bg);
      position: relative;
    }

    /* ── Header ── */
    #header {
      padding: calc(var(--safe-top) + 14px) 16px 14px;
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      z-index: 10;
    }

    #avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #c084fc);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    #header-info { flex: 1; min-width: 0; }

    #header-name {
      font-family: 'Fraunces', serif;
      font-size: 17px;
      font-weight: 300;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    #header-sub {
      font-size: 12px;
      color: var(--text2);
      margin-top: 1px;
    }

    #online-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
      margin-right: 5px;
      vertical-align: middle;
    }

    /* Lang selector */
    .lang-btn {
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      padding: 6px 11px;
      border-radius: 20px;
      border: 0.5px solid var(--border);
      background: var(--bg3);
      color: var(--text);
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }

    /* ── Messages area ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 14px 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { display: none; }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user { flex-direction: row-reverse; }

    .mini-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #c084fc);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-bottom: 2px;
    }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      font-size: 15px;
      line-height: 1.55;
      border-radius: 18px;
      word-break: break-word;
    }

    .bubble.bot {
      background: var(--bubble-bot);
      color: var(--text);
      border: 0.5px solid var(--border);
      border-bottom-left-radius: 5px;
    }

    .bubble.user {
      background: var(--bubble-user);
      color: #fff;
      border-bottom-right-radius: 5px;
    }

    .bubble.correction {
      background: var(--correction-bg);
      border: 0.5px solid var(--correction-border);
      color: var(--correction-text);
      border-radius: 12px;
      max-width: 85%;
      font-size: 13.5px;
      line-height: 1.55;
    }

    .correction-label {
      font-size: 11px;
      font-weight: 500;
      color: #f59e0b;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* Typing indicator */
    .typing-dots {
      display: flex;
      gap: 5px;
      padding: 4px 2px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text2);
      animation: blink 1.3s infinite ease-in-out;
    }

    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.85); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* ── Input area ── */
    #input-area {
      padding: 10px 14px calc(var(--safe-bottom) + 10px);
      background: var(--bg);
      border-top: 0.5px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      background: var(--bg3);
      border: 0.5px solid var(--border);
      border-radius: 22px;
      padding: 11px 16px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      resize: none;
      outline: none;
      line-height: 1.45;
      max-height: 120px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      transition: border-color 0.2s;
    }

    #msg-input::placeholder { color: var(--text2); }
    #msg-input:focus { border-color: rgba(124,109,250,0.5); }

    #send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    #send-btn:disabled { opacity: 0.35; cursor: default; }
    #send-btn:active:not(:disabled) { transform: scale(0.93); }

    #send-btn svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: #fff;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Config modal ── */
    #config-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    #config-overlay.hidden { display: none; }

    #config-sheet {
      background: var(--bg2);
      border-radius: 20px 20px 0 0;
      border-top: 0.5px solid var(--border);
      padding: 24px 20px calc(var(--safe-bottom) + 24px);
      width: 100%;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    #config-sheet h2 {
      font-family: 'Fraunces', serif;
      font-size: 20px;
      font-weight: 300;
      margin-bottom: 20px;
      color: var(--text);
    }

    .config-label {
      font-size: 12px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .config-input {
      width: 100%;
      background: var(--bg3);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      outline: none;
      margin-bottom: 16px;
      -webkit-appearance: none;
    }

    .config-input::placeholder { color: var(--text2); }

    #save-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.2s;
    }

    #save-btn:active { opacity: 0.85; }

    .config-note {
      font-size: 12px;
      color: var(--text2);
      margin-top: 12px;
      line-height: 1.5;
      text-align: center;
    }

    .config-note a { color: var(--accent2); text-decoration: none; }

    /* Settings icon button */

    /* ── Dictionnaire ── */
    #dict-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    #dict-overlay.open { transform: translateY(0); }

    #dict-header {
      padding: calc(var(--safe-top) + 14px) 16px 14px;
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    #dict-title {
      font-family: 'Fraunces', serif;
      font-size: 17px;
      font-weight: 300;
      flex: 1;
      color: var(--text);
    }

    #dict-close {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text2);
      font-size: 22px;
      line-height: 1;
      padding: 4px;
      display: flex;
      align-items: center;
    }

    #dict-search-bar {
      padding: 10px 14px;
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    #dict-input {
      flex: 1;
      background: var(--bg3);
      border: 0.5px solid var(--border);
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      outline: none;
    }

    #dict-input:focus { border-color: rgba(124,109,250,0.5); }
    #dict-input::placeholder { color: var(--text2); }

    #dict-search-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #fff;
      font-size: 18px;
    }

    #dict-frame-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    #dict-iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }

    #dict-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text2);
      font-size: 14px;
      text-align: center;
      padding: 24px;
    }

    #dict-placeholder .dict-icon { font-size: 48px; opacity: 0.4; }

    #dict-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--text2);
      display: flex;
      align-items: center;
      font-size: 20px;
    }

    #settings-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--text2);
      display: flex;
      align-items: center;
    }

    #settings-btn svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
    }
  </style>
</head>
<body>

<div id="app">
  <div id="header">
    <div id="avatar">🌍</div>
    <div id="header-info">
      <div id="header-name">LinguaPal</div>
      <div id="header-sub"><span id="online-dot"></span><span id="lang-display">Espagnol • en ligne</span></div>
    </div>
    <select class="lang-btn" id="lang-select">
      <option value="English">🇬🇧 Anglais</option>
      <option value="German">🇩🇪 Allemand</option>
      <option value="Spanish">🇪🇸 Espagnol</option>
      <option value="Italian">🇮🇹 Italien</option>
    </select>
    <button id="dict-btn" title="Dictionnaire" aria-label="Dictionnaire">📖</button>
    <button id="settings-btn" title="Paramètres" aria-label="Paramètres">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <textarea id="msg-input" rows="1" placeholder="Écris ton message..."></textarea>
    <button id="send-btn" disabled>
      <svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
    </button>
  </div>
</div>

<!-- Dictionnaire -->
<div id="dict-overlay">
  <div id="dict-header">
    <span id="dict-title">📖 Dictionnaire</span>
    <span id="dict-lang-label" style="font-size:13px;color:var(--text2);"></span>
    <button id="dict-close">✕</button>
  </div>
  <div id="dict-search-bar">
    <input id="dict-input" type="text" placeholder="Chercher un mot..." autocomplete="off" autocorrect="off" />
    <button id="dict-search-btn">🔍</button>
  </div>
  <div id="dict-frame-wrap">
    <div id="dict-placeholder">
      <span class="dict-icon">📖</span>
      <span>Saisis un mot et appuie sur 🔍<br/>WordReference s'ouvrira dans Safari</span>
    </div>
  </div>
</div>

<!-- Config modal -->
<div id="config-overlay" class="hidden">
  <div id="config-sheet">
    <h2>Configuration</h2>
    <div class="config-label">Clé API Gemini</div>
    <input class="config-input" type="password" id="api-key-input" placeholder="AIza..." autocomplete="off" />
    <div class="config-label">Langue cible</div>
    <select class="config-input" id="lang-select-modal">
      <option value="English">🇬🇧 Anglais</option>
      <option value="German">🇩🇪 Allemand</option>
      <option value="Spanish">🇪🇸 Espagnol</option>
      <option value="Italian">🇮🇹 Italien</option>
    </select>
    <div class="config-label">Mon niveau (CECRL)</div>
    <select class="config-input" id="level-select-modal">
      <option value="A1">A1 — Débutant complet</option>
      <option value="A2">A2 — Élémentaire</option>
      <option value="B1">B1 — Intermédiaire</option>
      <option value="B2" selected>B2 — Intermédiaire avancé</option>
      <option value="C1">C1 — Avancé</option>
      <option value="C2">C2 — Maîtrise</option>
    </select>
    <button id="save-btn">Enregistrer</button>
    <p class="config-note">
      Obtiens ta clé gratuite sur <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a>.<br/>
      La clé est sauvegardée uniquement sur ton téléphone.
    </p>
  </div>
</div>

<script>
  // ── State ──

  const WR_LANG = {
    "English": "enfr",
    "German":  "frd",
    "Spanish": "fres",
    "Italian": "frit"
  };

  const LANG_NAMES = {
    "English":"Anglais","German":"Allemand","Spanish":"Espagnol","Italian":"Italien"
  };
  const LANG_FLAGS = {
    "English":"🇬🇧","German":"🇩🇪","Spanish":"🇪🇸","Italian":"🇮🇹"
  };
  const LEVEL_DESC = {
    "A1":"vocabulaire très simple, phrases courtes, sujets du quotidien basiques (se présenter, compter, couleurs)",
    "A2":"phrases simples, sujets familiers (famille, courses, directions), vocabulaire courant limité",
    "B1":"phrases claires sur des sujets familiers, peut exprimer expériences et opinions simplement",
    "B2":"sujets complexes, nuances, expressions idiomatiques courantes, conversation fluide",
    "C1":"langue fluide et spontanée, vocabulaire riche, sujets complexes et abstraits",
    "C2":"maîtrise quasi-native, toutes nuances, expressions idiomatiques avancées, registres variés"
  };

  let apiKey = localStorage.getItem("gemini_key") || "";
  let lang = localStorage.getItem("lingua_lang") || "English";
  let level = localStorage.getItem("lingua_level") || "B1";
  let history = [];
  let busy = false;

  // ── DOM refs ──
  const messagesEl   = document.getElementById("messages");
  const inputEl      = document.getElementById("msg-input");
  const sendBtn      = document.getElementById("send-btn");
  const langSelect   = document.getElementById("lang-select");
  const langDisplay  = document.getElementById("lang-display");
  const settingsBtn  = document.getElementById("settings-btn");
  const overlay      = document.getElementById("config-overlay");
  const apiKeyInput  = document.getElementById("api-key-input");
  const langModal    = document.getElementById("lang-select-modal");
  const saveBtn      = document.getElementById("save-btn");

  // ── Init ──
  langSelect.value = lang;
  updateLangDisplay();
  checkSendBtn();

  if (!apiKey) {
    openConfig();
  } else {
    startConversation();
  }

  // ── Language ──
  function updateLangDisplay() {
    langDisplay.textContent = (LANG_FLAGS[lang] || "") + " " + (LANG_NAMES[lang] || lang) + " • en ligne";
  }

  langSelect.addEventListener("change", () => {
    lang = langSelect.value;
    localStorage.setItem("lingua_lang", lang);
    updateLangDisplay();
    resetConversation();
  });

  function resetConversation() {
    history = [];
    messagesEl.innerHTML = "";
    startConversation();
  }

  function startConversation() {
    addBotBubble("👋 Salut ! Je suis ton correspondant. Écris-moi en " + (LANG_NAMES[lang] || lang) + " (niveau " + level + ") et je te corrigerai si tu fais des fautes, avant de te répondre !");
  }

  // ── Bubbles ──
  function scrollBottom() {
    setTimeout(() => { messagesEl.scrollTop = messagesEl.scrollHeight; }, 50);
  }

  function addBotBubble(text) {
    const row = document.createElement("div");
    row.className = "msg-row";
    row.innerHTML = `<div class="mini-avatar">🌍</div><div class="bubble bot">${escapeHtml(text)}</div>`;
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function addUserBubble(text) {
    const row = document.createElement("div");
    row.className = "msg-row user";
    row.innerHTML = `<div class="bubble user">${escapeHtml(text)}</div>`;
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function addCorrectionBubble(text) {
    const row = document.createElement("div");
    row.className = "msg-row";
    row.innerHTML = `<div class="mini-avatar">🌍</div><div class="bubble correction"><div class="correction-label">✏️ Correction</div>${escapeHtml(text)}</div>`;
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function addTyping() {
    const row = document.createElement("div");
    row.className = "msg-row";
    row.id = "typing-row";
    row.innerHTML = `<div class="mini-avatar">🌍</div><div class="bubble bot"><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
    messagesEl.appendChild(row);
    scrollBottom();
    return row;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br/>");
  }

  // ── Send message ──
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || busy || !apiKey) return;

    busy = true;
    sendBtn.disabled = true;
    inputEl.value = "";
    inputEl.style.height = "auto";

    addUserBubble(text);

    const typing = addTyping();

    const systemPrompt = `Tu es un correspondant sympathique qui aide l'utilisateur à apprendre le ${LANG_NAMES[lang] || lang}. Son niveau CECRL est ${level}. À ce niveau, l'apprenant maîtrise : ${LEVEL_DESC[level]}.
Adapte ton vocabulaire, la complexité de tes phrases et les sujets abordés à ce niveau. Pour un A1/A2, utilise un langage très simple et des phrases courtes. Pour un B1/B2, sois naturel mais évite les expressions trop rares. Pour un C1/C2, parle librement avec richesse.
Ton rôle :
1. Vérifie si le message de l'utilisateur contient des fautes de grammaire, vocabulaire ou orthographe en ${lang}.
   - S'il y a des fautes : réponds UNIQUEMENT avec un objet JSON : {"correction": "Explication de la faute et version corrigée (en français)", "reply": "Ta réponse naturelle en ${lang} adaptée au niveau ${level}"}
   - S'il n'y a pas de fautes : réponds UNIQUEMENT avec un objet JSON : {"correction": null, "reply": "Ta réponse naturelle en ${lang} adaptée au niveau ${level}"}
2. Garde la conversation naturelle, comme un vrai correspondant.
3. Réponds toujours en ${lang} dans le champ "reply".
4. Les corrections doivent être bienveillantes, courtes et pédagogiques, en français. Adapte aussi les explications au niveau de l'utilisateur.
Réponds UNIQUEMENT avec l'objet JSON, sans markdown, sans texte supplémentaire.`;

    // Build Gemini contents array
    const contents = [];
    // Add conversation history
    for (const msg of history) {
      contents.push({ role: msg.role === "user" ? "user" : "model", parts: [{ text: msg.content }] });
    }
    // Add current message
    contents.push({ role: "user", parts: [{ text }] });

    if (!window._geminiModel) {
      try {
        const modelsRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
        const modelsData = await modelsRes.json();
        const available = (modelsData.models || []).map(m => m.name.replace("models/","")).filter(m => m.startsWith("gemini") && !m.includes("embedding") && !m.includes("aqa"));
        const preferred = ["gemini-2.5-flash-lite","gemini-2.5-flash","gemini-2.0-flash-lite","gemini-1.5-flash-001","gemini-1.5-flash"];
        window._geminiModel = preferred.find(p => available.some(a => a.startsWith(p))) || available[0] || "gemini-2.0-flash";
      } catch(e) { window._geminiModel = "gemini-2.0-flash"; }
    }

    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${window._geminiModel}:generateContent?key=${apiKey}`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            system_instruction: { parts: [{ text: systemPrompt }] },
            contents,
            generationConfig: { temperature: 0.8, maxOutputTokens: 1000 }
          })
        }
      );

      const data = await res.json();

      if (data.error) throw new Error(data.error.message);

      const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
      let parsed;
      try {
        parsed = JSON.parse(raw.replace(/```json|```/g, "").trim());
      } catch(e) {
        parsed = { correction: null, reply: raw };
      }

      history.push({ role: "user", content: text });
      history.push({ role: "assistant", content: raw });

      // Keep history manageable (last 20 messages)
      if (history.length > 20) history = history.slice(-20);

      typing.remove();
      if (parsed.correction) addCorrectionBubble(parsed.correction);
      addBotBubble(parsed.reply);

    } catch(e) {
      typing.remove();
      if (e.message && e.message.includes("API key")) {
        addBotBubble("❌ Clé API invalide. Appuie sur ⚙️ pour la corriger.");
      } else {
        addBotBubble("❌ Erreur : " + (e.message || "Réessaie dans un instant."));
      }
    }

    busy = false;
    checkSendBtn();
    inputEl.focus();
  }

  function checkSendBtn() {
    sendBtn.disabled = busy || !apiKey || !inputEl.value.trim();
  }

  // ── Input events ──
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
    checkSendBtn();
  });

  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  sendBtn.addEventListener("click", sendMessage);

  // ── Config modal ──
  function openConfig() {
    apiKeyInput.value = apiKey;
    langModal.value = lang;
    document.getElementById("level-select-modal").value = level;
    overlay.classList.remove("hidden");
    setTimeout(() => apiKeyInput.focus(), 350);
  }

  settingsBtn.addEventListener("click", openConfig);

  overlay.addEventListener("click", e => {
    if (e.target === overlay) overlay.classList.add("hidden");
  });

  saveBtn.addEventListener("click", () => {
    const newKey = apiKeyInput.value.trim();
    const newLang = langModal.value;
    if (!newKey) { apiKeyInput.style.borderColor = "var(--correction-border)"; return; }

    const newLevel = document.getElementById("level-select-modal").value;
    const langChanged = newLang !== lang || newLevel !== level;
    apiKey = newKey;
    lang = newLang;
    level = newLevel;
    localStorage.setItem("gemini_key", apiKey);
    localStorage.setItem("lingua_lang", lang);
    localStorage.setItem("lingua_level", level);
    langSelect.value = lang;
    updateLangDisplay();
    overlay.classList.add("hidden");
    checkSendBtn();

    if (langChanged || history.length === 0) resetConversation();
  });

  // ── Dictionnaire ──
  const dictOverlay  = document.getElementById("dict-overlay");
  const dictInput    = document.getElementById("dict-input");
  const dictBtn      = document.getElementById("dict-btn");
  const dictClose    = document.getElementById("dict-close");
  const dictSearchBtn= document.getElementById("dict-search-btn");
  const dictIframe   = document.getElementById("dict-iframe");
  const dictPlaceholder = document.getElementById("dict-placeholder");
  const dictLangLabel= document.getElementById("dict-lang-label");

  function openDict() {
    dictLangLabel.textContent = "FR ↔ " + (LANG_NAMES[lang] || lang);
    dictOverlay.classList.add("open");
    setTimeout(() => dictInput.focus(), 350);
  }

  function closeDict() {
    dictOverlay.classList.remove("open");
  }

  function searchWord() {
    const word = dictInput.value.trim();
    if (!word) return;
    const code = WR_LANG[lang] || "enfr";
    const url = `https://www.wordreference.com/${code}/${encodeURIComponent(word)}`;
    window.open(url, "_blank");
  }

  dictBtn.addEventListener("click", openDict);
  dictClose.addEventListener("click", closeDict);
  dictSearchBtn.addEventListener("click", searchWord);
  dictInput.addEventListener("keydown", e => {
    if (e.key === "Enter") searchWord();
  });

</script>
</body>
</html>
